name: Notify volcano-agentic-plugins sync

# Triggers the volcano-agentic-plugins submodule sync immediately on every
# main-branch update, instead of waiting for its daily cron
# (.github/workflows/sync-skills.yml there). That workflow's own
# workflow_dispatch trigger is reused as-is.
#
# Uses TEMP_PAT_TOKEN (a fine-grained PAT) as a stopgap until the
# "Kong Volcano - app" GitHub App's private key is available; swap both this
# and the matching reference in volcano-agentic-plugins's sync-skills.yml
# over to an App-minted token once that's ready, and delete the PAT.

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync-skills.yml in volcano-agentic-plugins
        env:
          GH_TOKEN: ${{ secrets.TEMP_PAT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "TEMP_PAT_TOKEN secret is not set; skipping dispatch." >&2
            exit 1
          fi
          gh workflow run sync-skills.yml --repo Kong/volcano-agentic-plugins --ref main
