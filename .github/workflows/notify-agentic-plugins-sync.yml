name: Notify volcano-agentic-plugins sync

# Triggers the volcano-agentic-plugins submodule sync immediately on every
# main-branch update, instead of waiting for its daily cron
# (.github/workflows/sync-skills.yml there). Fires a repository_dispatch
# event, which that workflow's on: block listens for.
#
# Uses repository_dispatch (not workflow_dispatch) deliberately: it only
# needs Contents: write on the target repo, vs. Actions: write for
# workflow_dispatch — matching the Contents+Pull-requests-only permission
# set already used for Release Please on volcano-cli.
#
# Authenticates as the "Kong Volcano - app" GitHub App (VOLCANO_APP_ID +
# VOLCANO_APP_KEY), scoped to only the target repo.

on:
  push:
    branches:
      - main

# No ambient GITHUB_TOKEN use in this job (auth is entirely via the
# App-minted token below), so drop its default scopes.
permissions: {}

# Collapse a burst of pushes into a single effective dispatch; cancelling a
# superseded run is safe here since the newer push's job will dispatch anyway.
concurrency:
  group: notify-agentic-plugins-sync
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token for volcano-agentic-plugins
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.VOLCANO_APP_ID }}
          private-key: ${{ secrets.VOLCANO_APP_KEY }}
          owner: Kong
          repositories: volcano-agentic-plugins
          # Without an explicit permission-* input, the minted token inherits
          # every permission the App installation holds on the target repo,
          # not just what this workflow needs. Scope it down explicitly.
          permission-contents: write

      - name: Dispatch sync-skills.yml in volcano-agentic-plugins
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/Kong/volcano-agentic-plugins/dispatches \
            --method POST \
            -f event_type=volcano-skills-updated
