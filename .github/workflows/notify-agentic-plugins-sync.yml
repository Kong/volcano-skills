name: Notify volcano-agentic-plugins sync

# Triggers the volcano-agentic-plugins submodule sync immediately on every
# main-branch update, instead of waiting for its daily cron
# (.github/workflows/sync-skills.yml there). That workflow's own
# workflow_dispatch trigger is reused as-is.
#
# Authenticates as the "Kong Volcano - app" GitHub App (VOLCANO_APP_ID +
# VOLCANO_APP_KEY), scoped to only the target repo. This replaced the earlier
# TEMP_PAT_TOKEN stopgap once the App's private key became available.

on:
  push:
    branches:
      - main

# No ambient GITHUB_TOKEN use in this job (auth is entirely via the
# App-minted token below), so drop its default scopes.
permissions: {}

# Collapse a burst of pushes into a single effective dispatch; cancelling a
# superseded run is safe here since the newer push's job will dispatch anyway.
concurrency:
  group: notify-agentic-plugins-sync
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token for volcano-agentic-plugins
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.VOLCANO_APP_ID }}
          private-key: ${{ secrets.VOLCANO_APP_KEY }}
          owner: Kong
          repositories: volcano-agentic-plugins

      - name: Dispatch sync-skills.yml in volcano-agentic-plugins
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh workflow run sync-skills.yml --repo Kong/volcano-agentic-plugins --ref main
